* { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

:root {
  --bg: #c8c8c8;
  --surface: #f4f4f4;
  --dice-bg: #ffffff;
  --dice-border: #222;
  --dot: #1a1a1a;
  --locked-glow: #3a7bd5;
  --btn-roll: #2d6be4;
  --btn-next: #555;
  --btn-disabled: #aaa;
  --text: #222;
  --counter-text: #444;
  --shadow: rgba(0,0,0,0.18);
}

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'Nunito', sans-serif;
  color: var(--text);
  overflow: hidden;
}

#app {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  height: 100dvh;
  padding: 4px 8px 12px;
  gap: 2px;
  position: relative;
}

/* ── TITLE ── */
h1 {
  font-size: clamp(1.4rem, 5vw, 1.9rem);
  font-weight: 800;
  letter-spacing: 0.04em;
  color: #333;
  text-align: center;
  flex-shrink: 0;
}

/* ── PLAY AREA ── */
#play-area {
  flex: 1;
  width: 100%;
  max-width: 520px;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 4px 0;
  gap: 0;
}

/* Two rows: locked row (top) + active row (bottom) */
.dice-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(6px, 2.5vw, 14px);
  width: 100%;
  min-height: calc(var(--dice-size) + 4px);
  transition: min-height 0.3s;
}

#locked-row   { align-items: flex-end; }
#active-row   { align-items: flex-start; }

/* row labels */
.row-label {
  position: absolute;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #888;
  opacity: 0;
  transition: opacity 0.4s;
  pointer-events: none;
}
#label-locked { top: 4px; }
#label-active { bottom: 4px; }
.row-label.visible { opacity: 1; }

/* divider between rows */
#divider {
  width: 80%;
  height: 2px;
  background: linear-gradient(90deg, transparent, #bbb, transparent);
  border-radius: 2px;
  opacity: 0;
  transition: opacity 0.4s;
  flex-shrink: 0;
  margin: 6px 0;
}
#divider.visible { opacity: 1; }

/* ── DICE ── */
:root { --dice-size: clamp(52px, 14vw, 76px); }

.die {
  width: var(--dice-size);
  height: var(--dice-size);
  background: var(--dice-bg);
  border: 2px solid var(--dice-border);
  border-radius: clamp(8px, 2vw, 13px);
  position: relative;
  cursor: grab;
  user-select: none;
  box-shadow: 0 2px 8px var(--shadow);
  transition:
    transform 0.18s ease,
    box-shadow 0.18s ease,
    border-color 0.25s ease;
  flex-shrink: 0;
}

.die:active { cursor: grabbing; }

.die.locked {
  border-color: var(--locked-glow);
  box-shadow: 0 0 0 2.5px var(--locked-glow), 0 2px 10px rgba(58,123,213,0.25);
}

.die.rolling {
  animation: shake 0.7s ease-in-out;
}

@keyframes shake {
  0%   { transform: rotate(0deg)   scale(1); }
  10%  { transform: rotate(-18deg) scale(1.08); }
  22%  { transform: rotate(15deg)  scale(0.95); }
  34%  { transform: rotate(-12deg) scale(1.06); }
  46%  { transform: rotate(10deg)  scale(0.97); }
  58%  { transform: rotate(-8deg)  scale(1.04); }
  70%  { transform: rotate(6deg)   scale(0.99); }
  82%  { transform: rotate(-4deg)  scale(1.01); }
  91%  { transform: rotate(2deg)   scale(1); }
  100% { transform: rotate(0deg)   scale(1); }
}

/* dragging ghost */
.die.dragging {
  opacity: 0.35;
}

/* drag-over highlight */
.die.drag-over {
  transform: scale(1.12);
  box-shadow: 0 4px 16px rgba(0,0,0,0.22);
}

/* ── DOTS (SVG) ── */
.die svg {
  width: 100%;
  height: 100%;
  display: block;
}

/* ── BOTTOM CONTROLS ── */
#controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  width: 100%;
  max-width: 340px;
  flex-shrink: 0;
  padding: 0 12px 20px;
  overflow-y: auto;
}

#roll-counter {
  font-size: clamp(1.1rem, 4.5vw, 1.3rem);
  font-weight: 700;
  color: var(--counter-text);
  letter-spacing: 0.03em;
}

.btn {
  width: 100%;
  padding: 14px 0;
  border: none;
  border-radius: 14px;
  font-family: 'Nunito', sans-serif;
  font-size: clamp(1rem, 3.5vw, 1.15rem);
  font-weight: 800;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: transform 0.12s, box-shadow 0.12s, background 0.2s;
  box-shadow: 0 3px 10px var(--shadow);
}
.btn:active:not(:disabled) { transform: scale(0.97); box-shadow: 0 1px 4px var(--shadow); }

#btn-roll {
  background: #2a9d3f;
  color: #fff;
}
#btn-roll:disabled {
  background: var(--btn-disabled);
  cursor: default;
  box-shadow: none;
}

#btn-lock {
  background: #2d6be4;
  color: #fff;
  display: none;
}
#btn-lock.visible { display: block; }



#btn-next {
  background: var(--btn-next);
  color: #fff;
  display: none;
}
#btn-next.visible { display: block; }

/* hint text */
#hint {
  font-size: clamp(0.9rem, 3.5vw, 1.05rem);
  color: #666;
  text-align: center;
  min-height: 2.4em;
  line-height: 1.4;
}

/* floating drag clone */
#drag-clone {
  position: fixed;
  pointer-events: none;
  z-index: 999;
  opacity: 0.88;
  display: none;
}

<div id="app">
  <h1>🎲 Yatzy – Nopat</h1>

  <div id="play-area">
    <span class="row-label" id="label-locked">Lukittu</span>
    <div class="dice-row" id="locked-row"></div>
    <div id="divider"></div>
    <div class="dice-row" id="active-row"></div>
    <span class="row-label" id="label-active">Vapaat</span>
  </div>

  <div id="controls">
    <div id="hint">Paina "Heitä noppia" aloittaaksesi.</div>
    <div id="roll-counter">Heittoja jäljellä: 3</div>
    <button class="btn" id="btn-roll">🎲 Heitä noppia</button>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const NUM_DICE = 5;
let rollsLeft = 3;
let gameStarted = false;
let animating = false;
let resultLocked = false;

// Each die: { id, value, locked }
let dice = Array.from({length: NUM_DICE}, (_, i) => ({
  id: i,
  value: 1,
  locked: false
}));

// ── DOM refs ──────────────────────────────────────────────────────────────
const lockedRow        = document.getElementById('locked-row');
const activeRow        = document.getElementById('active-row');
const divider          = document.getElementById('divider');
const labelLocked      = document.getElementById('label-locked');
const labelActive      = document.getElementById('label-active');
const rollCounter      = document.getElementById('roll-counter');
const btnRoll          = document.getElementById('btn-roll');
const btnLock          = document.getElementById('btn-lock');
const btnNext          = document.getElementById('btn-next');
const hintEl           = document.getElementById('hint');
const dragClone        = document.getElementById('drag-clone');

// ── SVG dot positions for faces 1–6 ───────────────────────────────────────
const DOT_POSITIONS = {
  1: [[50, 50]],
  2: [[25, 25], [75, 75]],
  3: [[25, 25], [50, 50], [75, 75]],
  4: [[25, 25], [75, 25], [25, 75], [75, 75]],
  5: [[25, 25], [75, 25], [50, 50], [25, 75], [75, 75]],
  6: [[25, 22], [75, 22], [25, 50], [75, 50], [25, 78], [75, 78]],
};

function makeDieSVG(value) {
  const dots = DOT_POSITIONS[value] || [];
  const r = 7.5;
  const dotsSVG = dots.map(([cx, cy]) =>
    `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#1a1a1a"/>`
  ).join('');
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${dotsSVG}</svg>`;
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  lockedRow.innerHTML = '';
  activeRow.innerHTML = '';

  const lockedDice = dice.filter(d => d.locked);
  const activeDice = dice.filter(d => !d.locked);
  const anyLocked  = lockedDice.length > 0;
  const gameOver   = rollsLeft === 0;

  divider.classList.toggle('visible', anyLocked && gameStarted && !resultLocked);
  labelLocked.classList.toggle('visible', anyLocked && gameStarted && rollsLeft < 3 && !resultLocked);
  labelActive.classList.toggle('visible', anyLocked && gameStarted && rollsLeft < 3 && !resultLocked);

  lockedDice.forEach(d => lockedRow.appendChild(createDieEl(d)));
  activeDice.forEach(d => activeRow.appendChild(createDieEl(d)));

  rollCounter.textContent = `Heittoja jäljellä: ${rollsLeft}`;

  // Button visibility
  const canLock = gameStarted && !gameOver && rollsLeft < 3;
  btnRoll.disabled = gameOver || animating || resultLocked;
  btnLock.classList.toggle('visible', canLock);
  btnLock.textContent = resultLocked ? '🔓 Pura lukitus' : '🔒 Lukitse tulos';
  btnNext.classList.toggle('visible', gameOver || resultLocked);

  // Hint text
  if (!gameStarted) {
    hintEl.textContent = 'Paina "Heitä noppia" aloittaaksesi.';
  } else if (resultLocked) {
    hintEl.innerHTML = 'Tulos lukittu. Paina "Pura lukitus"<br>jos haluat jatkaa heittämistä.';
  } else if (gameOver) {
    hintEl.textContent = 'Katso tuloksesi ja siirry seuraavaan pelaajaan.';
  } else if (rollsLeft === 3) {
    hintEl.textContent = 'Paina "Heitä noppia" aloittaaksesi.';
  } else {
    hintEl.innerHTML = 'Napauta noppaa lukitaksesi<br>Vedä järjestelläksesi.';
  }
}

function createDieEl(d) {
  const el = document.createElement('div');
  el.classList.add('die');
  if (d.locked) el.classList.add('locked');
  el.dataset.id = d.id;
  el.innerHTML = makeDieSVG(d.value);
  attachDieListeners(el, d);
  return el;
}

// ── Roll ───────────────────────────────────────────────────────────────────
function rollDice() {
  if (rollsLeft === 0 || animating) return;
  animating = true;
  gameStarted = true;

  // Assign new values to unlocked dice
  dice.forEach(d => {
    if (!d.locked) d.value = Math.ceil(Math.random() * 6);
  });

  rollsLeft--;
  render();

  // Animate unlocked dice
  const allEls = document.querySelectorAll('.die:not(.locked)');
  allEls.forEach(el => el.classList.add('rolling'));

  const ANIM_DURATION = 750;
  setTimeout(() => {
    allEls.forEach(el => el.classList.remove('rolling'));
    animating = false;
    render();
  }, ANIM_DURATION);
}

// ── Toggle lock (tap on die) ───────────────────────────────────────────────
function toggleLock(id) {
  if (!gameStarted || rollsLeft === 3 || animating || resultLocked) return;
  const d = dice.find(x => x.id === id);
  if (!d) return;
  d.locked = !d.locked;
  render();
}

// ── Lock / unlock result ───────────────────────────────────────────────────
function lockResult() {
  if (resultLocked) {
    // Pura lukitus: vapautetaan kaikki nopat keskiriville
    resultLocked = false;
    dice.forEach(d => { d.locked = false; });
  } else {
    // Lukitse: siirretään kaikki nopat yläriville
    resultLocked = true;
    dice.forEach(d => { d.locked = true; });
  }
  render();
}

// ── Next player ────────────────────────────────────────────────────────────
function nextPlayer() {
  rollsLeft = 3;
  gameStarted = false;
  resultLocked = false;
  dice.forEach(d => { d.locked = false; d.value = 1; });
  render();
}

// ── Drag & Drop ────────────────────────────────────────────────────────────
let dragState = null; // { dieId, startX, startY, cloneEl }

function attachDieListeners(el, d) {
  // Tap to lock/unlock
  let tapStartTime = 0;
  let moved = false;

  el.addEventListener('pointerdown', e => {
    tapStartTime = Date.now();
    moved = false;
    startDrag(e, d.id);
  });

  el.addEventListener('pointermove', e => {
    if (!dragState || dragState.dieId !== d.id) return;
    const dx = Math.abs(e.clientX - dragState.startX);
    const dy = Math.abs(e.clientY - dragState.startY);
    if (dx > 6 || dy > 6) moved = true;
    moveDrag(e);
  });

  el.addEventListener('pointerup', e => {
    if (!dragState || dragState.dieId !== d.id) return;
    const elapsed = Date.now() - tapStartTime;
    if (!moved && elapsed < 300) {
      cancelDrag();
      toggleLock(d.id);
    } else {
      endDrag(e, d.id);
    }
  });

  el.addEventListener('pointercancel', () => cancelDrag());
}

function startDrag(e, dieId) {
  if (animating) return;
  // Only start drag if the pointerdown target is actually the die or its SVG child
  const srcEl = e.currentTarget;
  if (!srcEl.contains(e.target)) return;
  e.preventDefault();
  const rect = srcEl.getBoundingClientRect();

  // Build clone
  dragClone.innerHTML = srcEl.innerHTML;
  const size = rect.width;
  dragClone.style.cssText = `
    display: block;
    width: ${size}px;
    height: ${size}px;
    background: #fff;
    border: 2px solid #222;
    border-radius: ${Math.round(size * 0.16)}px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.28);
    transform: scale(1.12);
    left: ${e.clientX - size/2}px;
    top:  ${e.clientY - size/2}px;
    position: fixed;
    pointer-events: none;
    z-index: 999;
    opacity: 0.92;
  `;
  const d = dice.find(x => x.id === dieId);
  if (d && d.locked) dragClone.style.borderColor = 'var(--locked-glow)';

  srcEl.classList.add('dragging');
  try { srcEl.setPointerCapture(e.pointerId); } catch(_) {}

  dragState = { dieId, startX: e.clientX, startY: e.clientY, pointerId: e.pointerId, srcEl };
}

function moveDrag(e) {
  if (!dragState) return;
  const size = parseFloat(dragClone.style.width);
  dragClone.style.left = `${e.clientX - size/2}px`;
  dragClone.style.top  = `${e.clientY - size/2}px`;

  // Highlight target die under pointer (excluding self)
  document.querySelectorAll('.die').forEach(el => el.classList.remove('drag-over'));
  const target = getDieUnder(e.clientX, e.clientY, dragState.dieId);
  if (target) target.classList.add('drag-over');
}

function endDrag(e, dieId) {
  if (!dragState) return;

  const target = getDieUnder(e.clientX, e.clientY, dieId);
  if (target) {
    const targetId = parseInt(target.dataset.id);
    swapDice(dieId, targetId);
  } else if (gameStarted && rollsLeft < 3 && !resultLocked) {
    const areaEl = document.getElementById('play-area');
    const areaRect = areaEl.getBoundingClientRect();
    const midY = areaRect.top + areaRect.height / 2;
    const srcDie = dice.find(x => x.id === dieId);
    if (srcDie) srcDie.locked = e.clientY < midY;
  }

  cancelDrag();
  render();
}

function cancelDrag() {
  if (dragState && dragState.srcEl) {
    try { dragState.srcEl.releasePointerCapture(dragState.pointerId); } catch(_) {}
  }
  dragClone.style.display = 'none';
  document.querySelectorAll('.die').forEach(el => {
    el.classList.remove('dragging', 'drag-over');
  });
  dragState = null;
}

function getDieUnder(x, y, excludeId) {
  const els = document.elementsFromPoint(x, y);
  for (const el of els) {
    if (el.classList.contains('die') && parseInt(el.dataset.id) !== excludeId) {
      return el;
    }
  }
  return null;
}

function swapDice(idA, idB) {
  const a = dice.find(x => x.id === idA);
  const b = dice.find(x => x.id === idB);
  if (!a || !b) return;
  // Swap values and locked state
  [a.value, b.value] = [b.value, a.value];
  [a.locked, b.locked] = [b.locked, a.locked];
}

// ── Button listeners ───────────────────────────────────────────────────────
btnRoll.addEventListener('click', rollDice);
btnLock.addEventListener('click', lockResult);
btnNext.addEventListener('click', nextPlayer);

// ── Init ───────────────────────────────────────────────────────────────────
render();
</script>
